name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  server:
    runs-on: macos-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build & test the server
        run: swift test
        working-directory: server

  bff:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bff/package-lock.json

      - name: Install
        run: npm ci
        working-directory: bff

      - name: Typecheck
        run: npm run typecheck
        working-directory: bff

      - name: Test
        run: npm test
        working-directory: bff

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Test the Kotlin core
        run: ./gradlew :core:test
        working-directory: android
